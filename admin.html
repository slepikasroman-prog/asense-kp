<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asense — Админка</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--dark:#1A1A2E;--navy:#2E4057;--bg:#F4F4F1;--surface:#fff;--border:#E0DDD5;--text:#1a1a1a;--muted:#888;--light:#F9F7F4;--green:#4CAF50;--orange:#FF9800;--red:#f44336;--blue:#2196F3}
body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:14px;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:#fff;border-radius:16px;padding:40px;width:360px;text-align:center}
.login-logo{font-size:32px;font-weight:300;letter-spacing:4px;color:var(--dark);margin-bottom:6px}
.login-logo em{font-style:italic;color:var(--gold)}
.login-sub{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:28px}
.login-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px;font-family:inherit}
.login-box input:focus{outline:none;border-color:var(--gold)}
.login-btn{width:100%;padding:11px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
.login-btn:hover{background:#2a2a45}
.login-error{color:var(--red);font-size:12px;margin-top:8px;display:none}

/* LAYOUT */
#app{display:none}
.header{background:var(--dark);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-logo{font-size:20px;font-weight:300;letter-spacing:3px;color:#fff}
.header-logo em{font-style:italic;color:var(--gold)}
.header-sub{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-top:2px}
.header-right{display:flex;align-items:center;gap:12px}
.header-right span{font-size:12px;color:rgba(255,255,255,0.5)}
.logout-btn{padding:6px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;font-size:12px;cursor:pointer;font-family:inherit}

.content{padding:24px 28px;max-width:1200px;margin:0 auto}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content}
.tab{padding:8px 20px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;border:none;background:none;font-family:inherit}
.tab.active{background:var(--dark);color:var(--gold);font-weight:500}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.card{padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.card.gold{background:var(--dark);border-color:var(--dark)}
.card-label{font-size:11px;color:var(--muted);margin-bottom:6px}
.card.gold .card-label{color:rgba(255,255,255,0.4)}
.card-val{font-size:26px;font-weight:500}
.card.gold .card-val{color:var(--gold)}
.card-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.table-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.table-title{font-size:14px;font-weight:500}
.table-filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filter-input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--surface);color:var(--text);font-family:inherit}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--navy)}
thead th{padding:9px 14px;color:#fff;font-weight:500;text-align:left;font-size:12px;white-space:nowrap}
tbody tr:nth-child(even){background:var(--light)}
tbody tr:hover{background:rgba(201,168,76,0.05)}
tbody td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.status-badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:500}

/* MANAGER CARDS */
.mgr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.mgr-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative}
.mgr-name{font-size:15px;font-weight:500;margin-bottom:4px}
.mgr-role{font-size:11px;color:var(--muted);margin-bottom:12px}
.mgr-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mgr-stat{padding:8px 10px;background:var(--light);border-radius:6px}
.mgr-stat-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.mgr-stat-val{font-size:16px;font-weight:500}
.mgr-progress{margin-top:10px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.mgr-progress-bar{height:100%;border-radius:3px;transition:width .5s}

/* PROGRESS BAR */
.progress-wrap{margin-bottom:20px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px}
.progress-bar-bg{height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:5px;transition:width .5s}

/* REFRESH */
.refresh-info{font-size:11px;color:var(--muted);margin-bottom:16px}

/* EMPTY */
.empty{padding:40px;text-align:center;color:var(--muted);font-size:13px}

@media(max-width:768px){
  .cards{grid-template-columns:1fr 1fr}
  .mgr-grid{grid-template-columns:1fr}
  .content{padding:16px}
  .header{padding:12px 16px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">As<em>é</em>nse</div>
    <div class="login-sub">ПАНЕЛЬ АДМИНИСТРАТОРА</div>
    <input type="text" id="login-user" placeholder="Логин" value="">
    <input type="password" id="login-pass" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Войти</button>
    <div class="login-error" id="login-error">Неверный логин или пароль</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div>
      <div class="header-logo">As<em>é</em>nse</div>
      <div class="header-sub">ПАНЕЛЬ АДМИНИСТРАТОРА</div>
    </div>
    <div class="header-right">
      <span id="last-update"></span>
      <button class="logout-btn" onclick="loadData()">🔄 Обновить</button>
      <button class="logout-btn" onclick="doLogout()">Выйти</button>
    </div>
  </div>

  <div class="content">
    <div class="tabs">
      <button class="tab active" onclick="showTab('overview')">📊 Обзор</button>
      <button class="tab" onclick="showTab('managers')">👥 Менеджеры</button>
      <button class="tab" onclick="showTab('kp')">📄 История КП</button>
      <button class="tab" onclick="showTab('sales')">💰 Продажи</button>
    </div>

    <!-- OVERVIEW -->
    <div id="tab-overview">
      <div class="cards" id="overview-cards"></div>
      <div class="progress-wrap" id="team-progress"></div>
      <div class="refresh-info" id="refresh-info"></div>
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">Активность за последние 7 дней</div>
        </div>
        <div id="recent-activity"></div>
      </div>
    </div>

    <!-- MANAGERS -->
    <div id="tab-managers" style="display:none">
      <div class="mgr-grid" id="mgr-grid"></div>
    </div>

    <!-- KP HISTORY -->
    <div id="tab-kp" style="display:none">
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">Все КП</div>
          <div class="table-filters">
            <input class="filter-input" placeholder="🔍 Поиск..." id="kp-search" oninput="renderKPTable()">
            <select class="filter-input" id="kp-status-filter" onchange="renderKPTable()">
              <option value="">Все статусы</option>
              <option value="new">Новый</option>
              <option value="sent">Отправлен</option>
              <option value="negotiation">Переговоры</option>
              <option value="paid">Оплачен</option>
            </select>
            <select class="filter-input" id="kp-mgr-filter" onchange="renderKPTable()">
              <option value="">Все менеджеры</option>
            </select>
          </div>
        </div>
        <div id="kp-table"></div>
      </div>
    </div>

    <!-- SALES -->
    <div id="tab-sales" style="display:none">
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">Все продажи</div>
          <div class="table-filters">
            <input class="filter-input" type="month" id="sales-month-filter" onchange="renderSalesTable()">
            <select class="filter-input" id="sales-mgr-filter" onchange="renderSalesTable()">
              <option value="">Все менеджеры</option>
            </select>
          </div>
        </div>
        <div id="sales-table"></div>
      </div>
    </div>

  </div>
</div>

<script>
const SB_URL = 'https://mtotltoanudwuxbvhejl.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10b3RsdG9hbnVkd3V4YnZoZWpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1Njk3OTAsImV4cCI6MjA5NjE0NTc5MH0.Gpl8skzkvSmUY3cNiPO0IQbgvhyLjFvMOvs5Spi1Xro';

// Admin credentials (change these!)
const ADMIN_USERS = {
  'roman': 'reka2882',
  'admin': 'reka2882'
};

var allKP = [];
var allSales = [];
var allProfiles = [];
var activeTab = 'overview';

// ===== AUTH =====
function doLogin(){
  var user = document.getElementById('login-user').value.trim().toLowerCase();
  var pass = document.getElementById('login-pass').value;
  if(ADMIN_USERS[user] && ADMIN_USERS[user] === pass){
    sessionStorage.setItem('admin_auth','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    loadData();
  } else {
    document.getElementById('login-error').style.display='block';
  }
}

function doLogout(){
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

// Check if already logged in
if(sessionStorage.getItem('admin_auth')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
}

// ===== DATA LOADING =====
function sbFetch(path){
  return fetch(SB_URL+'/rest/v1/'+path,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  }).then(function(r){return r.json();});
}

function loadData(){
  document.getElementById('last-update').textContent='Загрузка...';
  Promise.all([
    sbFetch('kp_history?order=created_at.desc&limit=500'),
    sbFetch('sales?order=created_at.desc&limit=1000'),
    sbFetch('manager_profiles?order=updated_at.desc')
  ]).then(function(results){
    allKP = results[0]||[];
    allSales = results[1]||[];
    allProfiles = results[2]||[];
    document.getElementById('last-update').textContent = 'Обновлено: '+new Date().toLocaleTimeString('ru-RU');
    renderAll();
  }).catch(function(e){
    document.getElementById('last-update').textContent = 'Ошибка загрузки';
    console.error(e);
  });
}

function renderAll(){
  renderOverview();
  renderManagers();
  renderKPTable();
  renderSalesTable();
  updateFilters();
}

// ===== TABS =====
function showTab(name){
  activeTab = name;
  ['overview','managers','kp','sales'].forEach(function(t){
    document.getElementById('tab-'+t).style.display = t===name?'':'none';
  });
  document.querySelectorAll('.tab').forEach(function(btn,i){
    btn.classList.toggle('active', ['overview','managers','kp','sales'][i]===name);
  });
}

// ===== OVERVIEW =====
function renderOverview(){
  var now = new Date();
  var thisMonth = allSales.filter(function(s){
    var d=new Date(s.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
  var totalSales = thisMonth.reduce(function(a,s){return a+s.amount;},0);
  var thisMonthKP = allKP.filter(function(k){
    var d=new Date(k.created_at||k.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
  var paidKP = allKP.filter(function(k){return k.status==='paid';});
  var paidSum = paidKP.reduce(function(a,k){
    var n = k.total ? parseInt(k.total.replace(/\D/g,'')) : 0; return a+n;
  },0);

  var months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('overview-cards').innerHTML =
    card('КП за '+months[now.getMonth()],'',thisMonthKP.length,'')
    +card('Продажи за '+months[now.getMonth()],'gold',totalSales?totalSales.toLocaleString('ru-RU')+' ₽':'—','')
    +card('Всего КП в базе','',allKP.length,'')
    +card('Менеджеров','',allProfiles.length,'активных');

  // Recent activity (last 7 days)
  var week = new Date(now.getTime()-7*24*60*60*1000);
  var recentKP = allKP.filter(function(k){return new Date(k.created_at||k.date)>week;});
  var recentSales = allSales.filter(function(s){return new Date(s.date)>week;});
  
  var rows = '';
  recentKP.slice(0,5).forEach(function(k){
    rows += '<tr><td>📄 КП создано</td><td>'+k.name+'</td><td>'+(k.manager_email||'—')+'</td><td>'+(k.total||'—')+'</td><td>'+formatDate(k.created_at||k.date)+'</td></tr>';
  });
  recentSales.slice(0,5).forEach(function(s){
    rows += '<tr><td>💰 Продажа</td><td>'+s.client+'</td><td>'+(s.manager_email||'—')+'</td><td>'+s.amount.toLocaleString('ru-RU')+' ₽</td><td>'+formatDate(s.date)+'</td></tr>';
  });

  document.getElementById('recent-activity').innerHTML = rows
    ? '<table><thead><tr><th>Событие</th><th>Клиент/КП</th><th>Менеджер</th><th>Сумма</th><th>Дата</th></tr></thead><tbody>'+rows+'</tbody></table>'
    : '<div class="empty">Нет активности за последние 7 дней</div>';

  document.getElementById('refresh-info').textContent = 'Данные: '+allKP.length+' КП, '+allSales.length+' продаж, '+allProfiles.length+' менеджеров';
}

function card(label,type,val,sub){
  return '<div class="card'+(type?' '+type:'')+'"><div class="card-label">'+label+'</div><div class="card-val">'+val+'</div>'+(sub?'<div class="card-sub">'+sub+'</div>':'')+'</div>';
}

// ===== MANAGERS =====
function renderManagers(){
  var now = new Date();
  var grid = document.getElementById('mgr-grid');
  if(!allProfiles.length){ grid.innerHTML='<div class="empty">Нет данных о менеджерах. Менеджеры должны заполнить профиль с Email в приложении.</div>'; return; }

  grid.innerHTML = allProfiles.map(function(p){
    var myKP = allKP.filter(function(k){return k.manager_email===p.email;});
    var myKPMonth = myKP.filter(function(k){
      var d=new Date(k.created_at||k.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    });
    var mySales = allSales.filter(function(s){return s.manager_email===p.email;});
    var mySalesMonth = mySales.filter(function(s){
      var d=new Date(s.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    });
    var salesSum = mySalesMonth.reduce(function(a,s){return a+s.amount;},0);
    var paidCount = myKP.filter(function(k){return k.status==='paid';}).length;

    return '<div class="mgr-card">'
      +'<div class="mgr-name">'+p.name+'</div>'
      +'<div class="mgr-role">'+(p.title||'Менеджер')+' · '+(p.email||p.tg||'')+'</div>'
      +'<div class="mgr-stats">'
      +'<div class="mgr-stat"><div class="mgr-stat-label">КП за месяц</div><div class="mgr-stat-val">'+myKPMonth.length+'</div></div>'
      +'<div class="mgr-stat"><div class="mgr-stat-label">Продажи</div><div class="mgr-stat-val" style="color:var(--gold)">'+(salesSum?salesSum.toLocaleString('ru-RU')+' ₽':'—')+'</div></div>'
      +'<div class="mgr-stat"><div class="mgr-stat-label">Всего КП</div><div class="mgr-stat-val">'+myKP.length+'</div></div>'
      +'<div class="mgr-stat"><div class="mgr-stat-label">Оплачено</div><div class="mgr-stat-val" style="color:var(--green)">'+paidCount+'</div></div>'
      +'</div>'
      +'</div>';
  }).join('');
}

// ===== KP TABLE =====
function renderKPTable(){
  var search = (document.getElementById('kp-search')||{}).value||'';
  var statusF = (document.getElementById('kp-status-filter')||{}).value||'';
  var mgrF = (document.getElementById('kp-mgr-filter')||{}).value||'';
  var statusColors = {new:'#888',sent:'#2196F3',negotiation:'#FF9800',paid:'#4CAF50'};
  var statusNames = {new:'Новый',sent:'Отправлен',negotiation:'Переговоры',paid:'Оплачен'};

  var filtered = allKP.filter(function(k){
    if(statusF && k.status!==statusF) return false;
    if(mgrF && k.manager_email!==mgrF) return false;
    if(search){
      var q=search.toLowerCase();
      return (k.name||'').toLowerCase().includes(q)||(k.manager_email||'').toLowerCase().includes(q)||(k.segment||'').includes(q);
    }
    return true;
  });

  if(!filtered.length){ document.getElementById('kp-table').innerHTML='<div class="empty">Нет КП</div>'; return; }

  var rows = filtered.map(function(k){
    var st=k.status||'new';
    var color=statusColors[st]||'#888';
    return '<tr>'
      +'<td>'+k.name+'</td>'
      +'<td>'+(k.segment||'—')+'</td>'
      +'<td style="font-size:12px;color:var(--muted)">'+(k.manager_email||'—')+'</td>'
      +'<td style="font-weight:500">'+(k.total||'—')+'</td>'
      +'<td><span class="status-badge" style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44">'+(statusNames[st]||st)+'</span></td>'
      +'<td style="font-size:12px;color:var(--muted)">'+formatDate(k.created_at||k.date)+'</td>'
      +'</tr>';
  }).join('');

  document.getElementById('kp-table').innerHTML =
    '<table><thead><tr><th>Клиент/КП</th><th>Сегмент</th><th>Менеджер</th><th>Сумма</th><th>Статус</th><th>Дата</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

// ===== SALES TABLE =====
function renderSalesTable(){
  var monthF = (document.getElementById('sales-month-filter')||{}).value||'';
  var mgrF = (document.getElementById('sales-mgr-filter')||{}).value||'';
  var segEmoji = {restaurant:'🍽',hotel:'🏨',spa:'💧',glamping:'⛺',fitness:'🏋',retail:'🛍',other:'📦'};

  var filtered = allSales.filter(function(s){
    if(mgrF && s.manager_email!==mgrF) return false;
    if(monthF){
      var d=new Date(s.date);
      var ym=(d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0'));
      if(ym!==monthF) return false;
    }
    return true;
  });

  var total = filtered.reduce(function(a,s){return a+s.amount;},0);

  if(!filtered.length){ document.getElementById('sales-table').innerHTML='<div class="empty">Нет продаж</div>'; return; }

  var rows = filtered.map(function(s){
    return '<tr>'
      +'<td>'+(segEmoji[s.segment]||'📦')+' '+s.client+'</td>'
      +'<td style="font-size:12px;color:var(--muted)">'+(s.manager_email||'—')+'</td>'
      +'<td style="font-weight:500;color:var(--gold)">'+s.amount.toLocaleString('ru-RU')+' ₽</td>'
      +'<td style="font-size:12px;color:var(--muted)">'+(s.comment||'—')+'</td>'
      +'<td style="font-size:12px;color:var(--muted)">'+formatDate(s.date)+'</td>'
      +'</tr>';
  }).join('');

  var totalRow = '<tr style="background:var(--dark)"><td colspan="2" style="color:#fff;font-weight:500;padding:10px 14px">Итого: '+filtered.length+' сделок</td><td style="color:var(--gold);font-weight:500;font-size:15px">'+total.toLocaleString('ru-RU')+' ₽</td><td colspan="2"></td></tr>';

  document.getElementById('sales-table').innerHTML =
    '<table><thead><tr><th>Клиент</th><th>Менеджер</th><th>Сумма</th><th>Комментарий</th><th>Дата</th></tr></thead><tbody>'+rows+totalRow+'</tbody></table>';
}

// ===== HELPERS =====
function updateFilters(){
  var emails = [...new Set(allKP.map(function(k){return k.manager_email;}).filter(Boolean))];
  var emailsSales = [...new Set(allSales.map(function(s){return s.manager_email;}).filter(Boolean))];
  var allEmails = [...new Set(emails.concat(emailsSales))];

  ['kp-mgr-filter','sales-mgr-filter'].forEach(function(id){
    var sel = document.getElementById(id);
    if(!sel) return;
    var cur = sel.value;
    sel.innerHTML = '<option value="">Все менеджеры</option>'+allEmails.map(function(e){return '<option value="'+e+'"'+(e===cur?' selected':'')+'>'+e+'</option>';}).join('');
  });

  // Set current month in sales filter
  var now = new Date();
  var monthEl = document.getElementById('sales-month-filter');
  if(monthEl && !monthEl.value){
    monthEl.value = now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0');
  }
}

function formatDate(str){
  if(!str) return '—';
  var d = new Date(str);
  if(isNaN(d)) return str;
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'});
}

// Auto-refresh every 2 minutes
setInterval(loadData, 120000);

// Init
if(sessionStorage.getItem('admin_auth')==='1') loadData();
